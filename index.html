<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0c1222" />
  <meta name="description" content="World Radio — thousands of stations, one self-contained page." />
  <title>World Radio — Relax &amp; Listen</title>
  <style>
    :root {
      --bg-deep: #070b14;
      --text: #eef3fb;
      --text-soft: #c2cce0;
      --text-muted: #8b9ab3;
      --accent: #7dd3c0;
      --accent-2: #8b9cf7;
      --danger: #f0a0a8;
      --warm: #e8c4a0;
      --radius: 18px;
      --radius-sm: 12px;
      --nav-w: 240px;
      --player-h: 96px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-display: Georgia, "Times New Roman", serif;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    button, input { font: inherit; color: inherit; border: none; background: none; }
    button { cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    img { display: block; max-width: 100%; }

    .ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(125,211,192,.1), transparent 55%),
        radial-gradient(ellipse 70% 50% at 85% 15%, rgba(139,156,247,.12), transparent 50%),
        radial-gradient(ellipse 60% 50% at 50% 90%, rgba(196,168,240,.08), transparent 55%),
        var(--bg-deep);
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: .28;
    }
    .orb-a { width: 420px; height: 420px; background: #7dd3c0; top: -80px; left: -60px; animation: da 22s ease-in-out infinite alternate; }
    .orb-b { width: 380px; height: 380px; background: #8b9cf7; top: 20%; right: -100px; animation: db 28s ease-in-out infinite alternate; }
    .orb-c { width: 320px; height: 320px; background: #c4a8f0; bottom: 10%; left: 30%; animation: dc 24s ease-in-out infinite alternate; }
    body.is-playing .orb { opacity: .4; }
    @keyframes da { to { transform: translate(80px,60px) scale(1.15); } }
    @keyframes db { to { transform: translate(-70px,90px) scale(1.1); } }
    @keyframes dc { to { transform: translate(50px,-70px) scale(1.2); } }

    #app {
      position: relative; z-index: 1; height: 100%;
      display: grid;
      grid-template-columns: var(--nav-w) 1fr;
      grid-template-rows: 1fr auto;
      grid-template-areas: "nav main" "player player";
      isolation: isolate;
    }

    .nav {
      grid-area: nav; position: relative; z-index: 2;
      display: flex; flex-direction: column; gap: 8px;
      padding: calc(16px + var(--safe-t)) 16px 16px;
      border-right: 1px solid rgba(180,205,240,.18);
      background: rgba(10,14,26,.82);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      overflow-y: auto;
    }
    .brand { display: flex; align-items: center; gap: 12px; padding: 4px 12px 20px; }
    .brand-mark {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(125,211,192,.25), rgba(139,156,247,.3));
      border: 1px solid rgba(180,205,240,.28);
      display: grid; place-items: center; flex-shrink: 0;
    }
    .brand-mark svg { width: 22px; height: 22px; }
    .brand-text h1 { font-family: var(--font-display); font-weight: 400; font-size: 1.35rem; line-height: 1.1; }
    .brand-text p { font-size: .72rem; color: var(--text-muted); letter-spacing: .04em; text-transform: uppercase; }
    .nav-section {
      margin-top: 12px; padding: 0 12px 6px;
      font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted);
    }
    .nav-btn {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 12px 14px; border-radius: var(--radius-sm);
      color: #d0dae8; text-align: left;
    }
    .nav-btn:hover, .nav-btn:active { background: rgba(255,255,255,.08); color: #fff; }
    .nav-btn.active {
      background: linear-gradient(135deg, rgba(125,211,192,.22), rgba(139,156,247,.2));
      color: #fff; border: 1px solid rgba(180,205,240,.28);
    }
    .nav-btn .icon { width: 18px; height: 18px; flex-shrink: 0; opacity: .9; }
    .nav-footer { margin-top: auto; padding: 16px 12px 4px; font-size: .72rem; color: var(--text-muted); line-height: 1.4; }
    .nav-footer a { color: var(--accent); text-decoration: none; }

    .main {
      grid-area: main; position: relative; z-index: 2;
      display: flex; flex-direction: column; min-width: 0; min-height: 0;
    }
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: calc(14px + var(--safe-t)) 20px 10px; flex-shrink: 0;
    }
    .search-wrap { flex: 1; max-width: 520px; position: relative; }
    .search-wrap .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; color: var(--text-muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 12px 16px 12px 42px; border-radius: 999px;
      background: #1c2a4a; border: 1px solid rgba(180,205,240,.28);
      color: var(--text); outline: none; font-size: 16px; /* 16px avoids iOS zoom */
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: rgba(125,211,192,.45); box-shadow: 0 0 0 3px rgba(125,211,192,.12); }
    .stats-pill {
      margin-left: auto; padding: 8px 14px; border-radius: 999px;
      background: #1c2a4a; border: 1px solid rgba(180,205,240,.28);
      font-size: .8rem; color: var(--text-soft); white-space: nowrap;
    }
    .stats-pill strong { color: var(--accent); }

    .content {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 8px 20px calc(20px + var(--safe-b));
    }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: rgba(160,190,230,.2); border-radius: 4px; }

    .hero {
      margin-bottom: 24px; padding: 24px 28px; border-radius: calc(var(--radius) + 4px);
      background: linear-gradient(135deg, rgba(125,211,192,.16), rgba(139,156,247,.14) 50%, rgba(196,168,240,.1)), #162038;
      border: 1px solid rgba(180,205,240,.28);
      box-shadow: 0 12px 40px rgba(0,0,0,.3);
    }
    .hero h2 {
      font-family: var(--font-display); font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 400; line-height: 1.15; margin-bottom: 8px;
    }
    .hero p { color: var(--text-soft); max-width: 42ch; font-size: .98rem; }

    .section-head {
      display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
      margin: 8px 0 14px; flex-wrap: wrap;
    }
    .section-head h3 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 400; }
    .section-head .meta { font-size: .82rem; color: var(--text-muted); }

    .chip-row, .continent-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }

    button.chip, .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 14px; border-radius: 999px;
      background: #1e2c4c !important;
      border: 1px solid rgba(180,205,240,.35) !important;
      color: #eef3fb !important; font-size: .85rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.28);
    }
    button.chip:hover, button.chip:active, .chip:hover {
      background: #2a3d68 !important; border-color: rgba(180,205,240,.5) !important;
    }
    button.chip.active, .chip.active {
      background: linear-gradient(135deg, #2d6b62, #3d4f9a) !important;
      border-color: rgba(125,211,192,.55) !important;
    }

    .station-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .station-card {
      display: flex; flex-direction: column; gap: 12px;
      padding: 16px; border-radius: var(--radius);
      background: #1c2a4a; border: 1px solid rgba(180,205,240,.28);
      box-shadow: 0 4px 18px rgba(0,0,0,.28); text-align: left;
    }
    .station-card.is-current { border-color: rgba(125,211,192,.45); }
    .station-card-top { display: flex; gap: 12px; align-items: flex-start; }
    .station-art, .player-art {
      width: 56px; height: 56px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, rgba(125,211,192,.2), rgba(139,156,247,.25));
      border: 1px solid rgba(180,205,240,.28);
      display: grid; place-items: center; overflow: hidden; flex-shrink: 0; font-size: 1.3rem;
    }
    .station-art img, .player-art img { width: 100%; height: 100%; object-fit: cover; }
    .station-name {
      font-weight: 600; font-size: .95rem; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .station-meta {
      margin-top: 4px; font-size: .78rem; color: var(--text-muted);
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }
    .station-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); }
    .station-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .tag-pill {
      font-size: .68rem; padding: 2px 8px; border-radius: 999px;
      background: rgba(255,255,255,.05); color: var(--text-muted);
      border: 1px solid rgba(180,205,240,.18);
    }
    .station-actions { display: flex; align-items: center; gap: 8px; margin-top: auto; }
    .btn-play {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 999px;
      background: linear-gradient(135deg, rgba(125,211,192,.3), rgba(139,156,247,.26));
      border: 1px solid rgba(125,211,192,.35); color: var(--text); font-size: .82rem; font-weight: 500;
    }
    .btn-play.is-playing { background: linear-gradient(135deg, rgba(125,211,192,.42), rgba(139,156,247,.36)); }
    .btn-icon {
      width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center;
      color: var(--text-soft);
    }
    .btn-icon:hover, .btn-icon:active { background: rgba(255,255,255,.08); color: #fff; }
    .btn-icon.is-fav { color: var(--warm); }
    .btn-icon svg { width: 18px; height: 18px; }

    .browse-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    button.browse-card, .browse-card {
      display: block; width: 100%; padding: 18px 16px; border-radius: var(--radius);
      background: #1c2a4a !important;
      border: 1px solid rgba(180,205,240,.32) !important;
      color: #eef3fb !important; text-align: left;
      box-shadow: 0 4px 18px rgba(0,0,0,.3);
    }
    button.browse-card:hover, button.browse-card:active {
      background: #273a64 !important; border-color: rgba(125,211,192,.55) !important;
    }
    .browse-card .flag { font-size: 1.6rem; margin-bottom: 10px; line-height: 1; }
    .browse-card .title { font-weight: 600; font-size: .95rem; margin-bottom: 4px; color: #f2f6fc !important; }
    .browse-card .count { font-size: .78rem; color: #b4c2d9 !important; }

    .empty, .error-box, .loading-box { text-align: center; padding: 48px 24px; color: var(--text-soft); }
    .error-box { color: var(--danger); }
    .spinner {
      width: 36px; height: 36px; border: 2px solid rgba(180,205,240,.25);
      border-top-color: var(--accent); border-radius: 50%;
      margin: 0 auto 16px; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-more-wrap { display: flex; justify-content: center; margin: 24px 0 12px; }
    .btn-more {
      padding: 12px 28px; border-radius: 999px; background: #1c2a4a;
      border: 1px solid rgba(180,205,240,.28); color: var(--text-soft);
    }

    .player {
      grid-area: player; position: relative; z-index: 3;
      min-height: var(--player-h);
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px;
      padding: 12px 20px calc(12px + var(--safe-b));
      background: rgba(10,14,26,.94);
      border-top: 1px solid rgba(180,205,240,.18);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    }
    .player-now { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .player-art.live { box-shadow: 0 0 0 2px rgba(125,211,192,.45); }
    .player-meta { min-width: 0; }
    .player-meta .now-label {
      font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 2px;
    }
    .player-meta .now-name {
      font-weight: 600; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-meta .now-sub {
      font-size: .78rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-meta .now-error { font-size: .75rem; color: var(--danger); margin-top: 2px; }
    .player-controls { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-main-play {
      width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center;
      background: linear-gradient(145deg, #7dd3c0, #8b9cf7); color: #0c1222;
      box-shadow: 0 8px 24px rgba(125,211,192,.25);
    }
    .btn-main-play:disabled { opacity: .4; box-shadow: none; }
    .btn-main-play svg { width: 24px; height: 24px; }
    .eq { display: flex; align-items: flex-end; gap: 3px; height: 18px; opacity: 0; }
    .eq.on { opacity: 1; }
    .eq span {
      width: 3px; border-radius: 2px; background: var(--accent);
      animation: eq .9s ease-in-out infinite alternate;
    }
    .eq span:nth-child(1) { height: 40%; }
    .eq span:nth-child(2) { height: 80%; animation-delay: .15s; }
    .eq span:nth-child(3) { height: 55%; animation-delay: .3s; }
    .eq span:nth-child(4) { height: 90%; animation-delay: .1s; }
    @keyframes eq { from { transform: scaleY(.4); } to { transform: scaleY(1); } }
    .player-volume { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
    .volume-slider {
      -webkit-appearance: none; appearance: none; width: 100px; height: 4px;
      border-radius: 2px; background: rgba(255,255,255,.15); outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
    }
    .player-placeholder {
      grid-column: 1 / -1; text-align: center; color: var(--text-muted);
      font-family: var(--font-display); font-size: 1.05rem;
    }

    .mobile-nav-toggle {
      display: none; width: 42px; height: 42px; border-radius: 12px;
      place-items: center; background: #1c2a4a; border: 1px solid rgba(180,205,240,.28); flex-shrink: 0;
    }
    .mobile-nav-toggle svg { width: 20px; height: 20px; }
    .nav-backdrop { display: none; }

    @media (max-width: 900px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-areas: "main" "player";
      }
      .nav {
        position: fixed; inset: 0 auto 0 0; width: min(300px, 86vw); z-index: 50;
        transform: translateX(-105%); transition: transform .3s var(--ease);
        background: rgba(10,14,26,.97); box-shadow: 0 12px 40px rgba(0,0,0,.4);
      }
      .nav.open { transform: translateX(0); }
      .nav-backdrop {
        display: block; position: fixed; inset: 0; z-index: 40;
        background: rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .3s;
      }
      .nav-backdrop.open { opacity: 1; pointer-events: auto; }
      .mobile-nav-toggle { display: grid; }
      .topbar { padding: 12px 14px 8px; padding-top: calc(12px + var(--safe-t)); }
      .content { padding: 8px 14px 16px; }
      .stats-pill { display: none; }
      .player {
        grid-template-columns: 1fr auto; grid-template-rows: auto auto; gap: 10px;
        padding: 12px 14px calc(12px + var(--safe-b));
      }
      .player-controls { grid-column: 2; grid-row: 1; }
      .player-volume { grid-column: 1 / -1; justify-content: center; }
      .hero { padding: 18px; }
    }
    @media (max-width: 480px) {
      .station-grid { grid-template-columns: 1fr; }
      .browse-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
    /* PWA additions */
    .install-banner {
      position: fixed; bottom: calc(var(--player-h) + 12px + var(--safe-b)); left: 50%; transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, #1c2a4a, #162038); border: 1px solid rgba(125,211,192,.35);
      padding: 12px 16px; border-radius: 14px; box-shadow: 0 12px 32px rgba(0,0,0,.4);
      display: flex; align-items: center; gap: 12px; z-index: 100; opacity: 0; pointer-events: none; transition: all .35s var(--ease);
      backdrop-filter: blur(16px);
    }
    .install-banner.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .install-banner button { padding: 8px 14px; border-radius: 999px; font-size: .85rem; font-weight: 600; }
    .install-banner .btn-install { background: linear-gradient(135deg, #7dd3c0, #8b9cf7); color: #0c1222; }
    .install-banner .btn-dismiss { background: rgba(255,255,255,.08); color: var(--text-soft); }
  </style>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="World Radio" />
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>
  <div id="app"></div>

  <div id="installBanner" class="install-banner" role="dialog" aria-hidden="true">
    <span>📻 Install World Radio?</span>
    <button type="button" class="btn-install" id="btnInstall">Install</button>
    <button type="button" class="btn-dismiss" id="btnDismiss">Later</button>
  </div>

  <script>
(function () {
  'use strict';

  const PAGE = 40;
  const MIRRORS = [
    'https://de1.api.radio-browser.info',
    'https://nl1.api.radio-browser.info',
    'https://at1.api.radio-browser.info',
    'https://fr1.api.radio-browser.info',
  ];
  let baseUrl = MIRRORS[0];
  let baseReady = null;

  const CONTINENTS = {
    Africa: ['DZ','AO','BJ','BW','BF','BI','CM','CV','CF','TD','KM','CG','CD','CI','DJ','EG','GQ','ER','SZ','ET','GA','GM','GH','GN','GW','KE','LS','LR','LY','MG','MW','ML','MR','MU','MA','MZ','NA','NE','NG','RW','ST','SN','SC','SL','SO','ZA','SS','SD','TZ','TG','TN','UG','ZM','ZW'],
    Asia: ['AF','AM','AZ','BH','BD','BT','BN','KH','CN','CY','GE','HK','IN','ID','IR','IQ','IL','JP','JO','KZ','KW','KG','LA','LB','MO','MY','MV','MN','MM','NP','KP','OM','PK','PS','PH','QA','SA','SG','KR','LK','SY','TW','TJ','TH','TL','TR','TM','AE','UZ','VN','YE'],
    Europe: ['AL','AD','AT','BY','BE','BA','BG','HR','CZ','DK','EE','FI','FR','DE','GR','HU','IS','IE','IT','XK','LV','LI','LT','LU','MT','MD','MC','ME','NL','MK','NO','PL','PT','RO','RU','SM','RS','SK','SI','ES','SE','CH','UA','GB','VA'],
    'North America': ['AG','BS','BB','BZ','CA','CR','CU','DM','DO','SV','GD','GT','HT','HN','JM','MX','NI','PA','KN','LC','VC','TT','US'],
    'South America': ['AR','BO','BR','CL','CO','EC','GY','PY','PE','SR','UY','VE'],
    Oceania: ['AU','FJ','KI','MH','FM','NR','NZ','PW','PG','WS','SB','TO','TV','VU'],
  };

  const MOOD_TAGS = [
    { id: 'jazz', label: 'Jazz', emoji: '🎷' },
    { id: 'classical', label: 'Classical', emoji: '🎻' },
    { id: 'ambient', label: 'Ambient', emoji: '🌙' },
    { id: 'chillout', label: 'Chillout', emoji: '🍃' },
    { id: 'lounge', label: 'Lounge', emoji: '🍸' },
    { id: 'relax', label: 'Relax', emoji: '☁' },
    { id: 'meditation', label: 'Meditation', emoji: '🕊' },
    { id: 'nature', label: 'Nature', emoji: '🌲' },
    { id: 'piano', label: 'Piano', emoji: '🎹' },
    { id: 'smooth jazz', label: 'Smooth Jazz', emoji: '✨' },
    { id: 'easy listening', label: 'Easy Listening', emoji: '☕' },
    { id: 'new age', label: 'New Age', emoji: '🌊' },
    { id: 'soul', label: 'Soul', emoji: '💜' },
    { id: 'blues', label: 'Blues', emoji: '🎸' },
    { id: 'folk', label: 'Folk', emoji: '🪕' },
    { id: 'world music', label: 'World', emoji: '🌍' },
    { id: 'news', label: 'News', emoji: '📰' },
    { id: 'talk', label: 'Talk', emoji: '🎙' },
    { id: 'pop', label: 'Pop', emoji: '💫' },
    { id: 'rock', label: 'Rock', emoji: '🤘' },
    { id: 'electronic', label: 'Electronic', emoji: '⚡' },
    { id: 'dance', label: 'Dance', emoji: '🪩' },
    { id: 'hip hop', label: 'Hip Hop', emoji: '🎤' },
    { id: 'reggae', label: 'Reggae', emoji: '🌴' },
  ];

  const FAV_KEY = 'world-radio:favorites';
  const RECENT_KEY = 'world-radio:recent';
  const VOLUME_KEY = 'world-radio:volume';

  function loadFavorites() {
    try { const p = JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); return Array.isArray(p) ? p : []; }
    catch { return []; }
  }
  function saveFavorites(ids) { try { localStorage.setItem(FAV_KEY, JSON.stringify(ids)); } catch {} }
  function loadRecent() {
    try { const p = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); return Array.isArray(p) ? p : []; }
    catch { return []; }
  }
  function saveRecent(stations) {
    try { localStorage.setItem(RECENT_KEY, JSON.stringify(stations.slice(0, 40))); } catch {}
  }
  function loadVolume() {
    try {
      const v = localStorage.getItem(VOLUME_KEY);
      if (v == null) return 0.75;
      const n = Number(v);
      return Number.isFinite(n) ? Math.min(1, Math.max(0, n)) : 0.75;
    } catch { return 0.75; }
  }
  function saveVolume(v) { try { localStorage.setItem(VOLUME_KEY, String(v)); } catch {} }

  async function pickMirror() {
    if (baseReady) return baseReady;
    baseReady = (async () => {
      for (const m of MIRRORS) {
        try {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 4000);
          const res = await fetch(m + '/json/stats', { signal: ctrl.signal });
          clearTimeout(t);
          if (res.ok) { baseUrl = m; return; }
        } catch {}
      }
      baseUrl = MIRRORS[0];
    })();
    return baseReady;
  }

  async function apiFetch(path) {
    await pickMirror();
    const res = await fetch(baseUrl + path, { headers: { Accept: 'application/json' } });
    if (!res.ok) throw new Error('Radio API error ' + res.status);
    return res.json();
  }

  function toQuery(params) {
    const q = new URLSearchParams();
    Object.keys(params).forEach((k) => {
      const v = params[k];
      if (v !== undefined && v !== null && v !== '') q.set(k, String(v));
    });
    return q.toString();
  }

  async function searchStations(params) {
    const defaults = {
      hidebroken: true, order: 'clickcount', reverse: true, limit: PAGE, offset: 0,
    };
    const p = Object.assign({}, defaults, params);
    return apiFetch('/json/stations/search?' + toQuery(p));
  }

  async function getTopStations(limit, offset) {
    return searchStations({ limit: limit || PAGE, offset: offset || 0 });
  }
  async function getStationsByCountry(code, limit, offset) {
    return searchStations({ countrycode: code, limit: limit || PAGE, offset: offset || 0 });
  }
  async function getStationsByTag(tag, limit, offset) {
    return searchStations({ tag: tag, limit: limit || PAGE, offset: offset || 0 });
  }
  async function getStationsByUuid(uuid) {
    return apiFetch('/json/stations/byuuid/' + uuid);
  }
  async function getCountries() {
    const list = await apiFetch('/json/countries?order=stationcount&reverse=true&hidebroken=true');
    return list.filter((c) => c.stationcount > 0 && c.iso_3166_1);
  }
  async function getTags(limit) {
    const list = await apiFetch('/json/tags?order=stationcount&reverse=true&hidebroken=true&limit=' + (limit || 120));
    return list.filter((t) => t.stationcount > 0 && t.name && t.name.trim());
  }
  async function resolveStream(uuid) {
    try {
      const data = await apiFetch('/json/url/' + uuid);
      if (Array.isArray(data)) return (data[0] && data[0].url) || null;
      return (data && data.url) || null;
    } catch { return null; }
  }

  /* ── Player ── */
  const audio = new Audio();
  audio.preload = 'none';
  audio.setAttribute('playsinline', '');
  audio.setAttribute('webkit-playsinline', '');
  let playerListeners = [];
  const player = {
    station: null, playing: false, loading: false, error: null, volume: 0.75, muted: false,
    subscribe(fn) { playerListeners.push(fn); return () => { playerListeners = playerListeners.filter((f) => f !== fn); }; },
    emit() { playerListeners.forEach((f) => f()); },
    setVolume(v) {
      this.volume = Math.min(1, Math.max(0, v));
      audio.volume = this.muted ? 0 : this.volume;
      this.emit();
    },
    setMuted(m) {
      this.muted = m;
      audio.volume = m ? 0 : this.volume;
      this.emit();
    },
    async play(station) {
      this.station = station;
      this.loading = true;
      this.error = null;
      this.playing = false;
      this.emit();
      audio.pause();
      audio.removeAttribute('src');
      try { audio.load(); } catch {}

      let streamUrl = (await resolveStream(station.stationuuid)) || station.url_resolved || station.url;
      if (!streamUrl) {
        this.loading = false;
        this.error = 'No stream URL available.';
        this.emit();
        return;
      }
      if (location.protocol === 'https:' && streamUrl.indexOf('http:') === 0) {
        streamUrl = streamUrl.replace(/^http:/, 'https:');
      }
      audio.src = streamUrl;
      audio.volume = this.muted ? 0 : this.volume;
      try {
        await audio.play();
      } catch (err) {
        const original = station.url_resolved || station.url;
        if (original && original !== streamUrl) {
          try {
            audio.src = original;
            await audio.play();
            return;
          } catch {}
        }
        this.loading = false;
        this.playing = false;
        this.error = (err && err.name === 'NotAllowedError')
          ? 'Tap play to start audio.'
          : 'Could not play this station. Try another.';
        this.emit();
      }
    },
    toggle() {
      if (!this.station) return;
      if (this.playing) audio.pause();
      else if (audio.src) {
        this.loading = true;
        this.emit();
        audio.play().catch(() => {
          this.loading = false;
          this.error = 'Could not resume playback.';
          this.emit();
        });
      } else {
        this.play(this.station);
      }
    },
  };

  audio.addEventListener('playing', () => { player.playing = true; player.loading = false; player.error = null; player.emit(); });
  audio.addEventListener('pause', () => { player.playing = false; player.loading = false; player.emit(); });
  audio.addEventListener('waiting', () => { player.loading = true; player.emit(); });
  audio.addEventListener('error', () => {
    player.playing = false; player.loading = false;
    player.error = 'Could not play this station. Try another.';
    player.emit();
  });
  audio.addEventListener('ended', () => { player.playing = false; player.emit(); });

  /* ── State ── */
  const state = {
    view: 'discover',
    stations: [],
    countries: [],
    tags: [],
    favorites: loadFavorites(),
    recent: loadRecent(),
    current: null,
    loading: true,
    loadingMore: false,
    error: null,
    query: '',
    selectedCountry: null,
    selectedTag: null,
    volume: loadVolume(),
    muted: false,
    offset: 0,
    hasMore: true,
    continentFilter: null,
  };
  let searchTimer = null;
  let navOpen = false;
  let totalStationHint = 0;

  const icons = {
    radio: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 5v2M12 17v2M5 12h2M17 12h2"/><path d="M7.05 7.05l1.4 1.4M15.55 15.55l1.4 1.4M7.05 16.95l1.4-1.4M15.55 8.45l1.4-1.4" opacity=".6"/></svg>',
    discover: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5l-2.2 5.3-2.3-2.3z"/></svg>',
    globe: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>',
    music: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V6l10-2v12"/><circle cx="7" cy="18" r="2.5"/><circle cx="17" cy="16" r="2.5"/></svg>',
    heart: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-4.5-7-10a4 4 0 017-2.5A4 4 0 0119 11c0 5.5-7 10-7 10z"/></svg>',
    heartFill: '<svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.2"><path d="M12 21s-7-4.5-7-10a4 4 0 017-2.5A4 4 0 0119 11c0 5.5-7 10-7 10z"/></svg>',
    clock: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
    search: '<svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>',
    play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l11-6.5z"/></svg>',
    pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>',
    volume: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M4 10v4h3l5 4V6L7 10H4z"/><path d="M16 9a4 4 0 010 6M18.5 7a7 7 0 010 10"/></svg>',
    mute: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M4 10v4h3l5 4V6L7 10H4z"/><path d="M18 10l4 4M22 10l-4 4"/></svg>',
    menu: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h16M4 17h16"/></svg>',
    loader: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><circle cx="12" cy="12" r="9" opacity=".25"/><path d="M21 12a9 9 0 00-9-9"/></svg>',
  };

  function countryFlag(code) {
    if (!code || code.length !== 2) return '🌐';
    const cc = code.toUpperCase();
    return String.fromCodePoint(127397 + cc.charCodeAt(0), 127397 + cc.charCodeAt(1));
  }
  function formatTags(tags, max) {
    if (!tags) return [];
    return tags.split(',').map((t) => t.trim()).filter(Boolean).slice(0, max || 3);
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function isFav(id) { return state.favorites.indexOf(id) !== -1; }

  function toggleFavorite(station) {
    if (isFav(station.stationuuid)) {
      state.favorites = state.favorites.filter((id) => id !== station.stationuuid);
    } else {
      state.favorites = [station.stationuuid].concat(state.favorites);
    }
    saveFavorites(state.favorites);
    render();
  }

  function pushRecent(station) {
    const rest = state.recent.filter((s) => s.stationuuid !== station.stationuuid);
    state.recent = [station].concat(rest).slice(0, 40);
    saveRecent(state.recent);
  }

  async function playStation(station) {
    state.current = station;
    pushRecent(station);
    render();
    await player.play(station);
  }

  async function loadDiscover(reset) {
    if (reset) {
      state.loading = true; state.error = null; state.offset = 0; state.stations = [];
      render();
    } else {
      state.loadingMore = true; render();
    }
    try {
      let list;
      if (state.selectedTag) list = await getStationsByTag(state.selectedTag, PAGE, state.offset);
      else list = await getTopStations(PAGE, state.offset);
      state.stations = reset ? list : state.stations.concat(list);
      state.hasMore = list.length >= PAGE;
      state.offset += list.length;
    } catch (e) {
      state.error = e.message || 'Failed to load stations';
    } finally {
      state.loading = false; state.loadingMore = false; render();
    }
  }

  async function loadSearch(q, reset) {
    if (reset) {
      state.loading = true; state.error = null; state.offset = 0; state.stations = [];
      render();
    } else {
      state.loadingMore = true; render();
    }
    try {
      const list = await searchStations({ name: q, limit: PAGE, offset: state.offset });
      state.stations = reset ? list : state.stations.concat(list);
      state.hasMore = list.length >= PAGE;
      state.offset += list.length;
    } catch (e) {
      state.error = e.message || 'Search failed';
    } finally {
      state.loading = false; state.loadingMore = false; render();
    }
  }

  async function loadCountryStations(code, reset) {
    if (reset) {
      state.loading = true; state.error = null; state.offset = 0; state.stations = [];
      render();
    } else {
      state.loadingMore = true; render();
    }
    try {
      const list = await getStationsByCountry(code, PAGE, state.offset);
      state.stations = reset ? list : state.stations.concat(list);
      state.hasMore = list.length >= PAGE;
      state.offset += list.length;
    } catch (e) {
      state.error = e.message || 'Failed to load country stations';
    } finally {
      state.loading = false; state.loadingMore = false; render();
    }
  }

  async function ensureMeta() {
    try {
      const results = await Promise.all([getCountries(), getTags(150)]);
      state.countries = results[0];
      state.tags = results[1];
      totalStationHint = state.countries.reduce((sum, c) => sum + c.stationcount, 0);
    } catch {}
    render();
  }

  async function loadFavoritesStations() {
    state.loading = true; state.error = null; state.hasMore = false; render();
    try {
      if (!state.favorites.length) {
        state.stations = [];
      } else {
        const byId = {};
        state.recent.forEach((s) => { byId[s.stationuuid] = s; });
        state.stations.forEach((s) => { byId[s.stationuuid] = s; });
        const missing = state.favorites.filter((id) => !byId[id]);
        for (let i = 0; i < missing.length; i++) {
          try {
            const list = await getStationsByUuid(missing[i]);
            if (list[0]) byId[list[0].stationuuid] = list[0];
          } catch {}
        }
        state.stations = state.favorites.map((id) => byId[id]).filter(Boolean);
      }
    } catch (e) {
      state.error = e.message || 'Failed to load favorites';
    } finally {
      state.loading = false; render();
    }
  }

  function setView(view) {
    state.view = view;
    state.selectedCountry = null;
    if (view !== 'discover') state.selectedTag = null;
    navOpen = false;

    if (view === 'discover') {
      loadDiscover(true);
    } else if (view === 'countries') {
      state.loading = state.countries.length === 0;
      state.stations = [];
      state.error = null;
      if (state.countries.length === 0) {
        ensureMeta().then(() => { state.loading = false; render(); });
      } else {
        state.loading = false; render();
      }
    } else if (view === 'genres') {
      state.loading = state.tags.length === 0;
      state.stations = [];
      state.error = null;
      if (state.tags.length === 0) {
        ensureMeta().then(() => { state.loading = false; render(); });
      } else {
        state.loading = false; render();
      }
    } else if (view === 'favorites') {
      loadFavoritesStations();
    } else if (view === 'recent') {
      state.stations = state.recent.slice();
      state.loading = false; state.hasMore = false; state.error = null;
      render();
    } else if (view === 'search') {
      if (state.query.trim()) loadSearch(state.query.trim(), true);
      else { state.stations = []; state.loading = false; render(); }
    }
  }

  function openCountry(code) {
    state.view = 'countries';
    state.selectedCountry = code;
    loadCountryStations(code, true);
  }

  function openTag(tag) {
    state.view = 'discover';
    state.selectedTag = tag;
    loadDiscover(true);
  }

  function stationArtHtml(station, cls) {
    cls = cls || 'station-art';
    const initial = escapeHtml(((station.name || '?').trim().charAt(0) || '♪').toUpperCase());
    if (station.favicon) {
      return '<div class="' + cls + '" data-fallback="' + initial + '">' +
        '<img src="' + escapeHtml(station.favicon) + '" alt="" loading="lazy" referrerpolicy="no-referrer" ' +
        'onerror="this.remove();this.parentElement.textContent=this.parentElement.dataset.fallback"/>' +
        '</div>';
    }
    return '<div class="' + cls + '">' + initial + '</div>';
  }

  function stationCard(station) {
    const current = state.current && state.current.stationuuid === station.stationuuid;
    const playing = current && player.playing;
    const fav = isFav(station.stationuuid);
    const tags = formatTags(station.tags);
    const country = station.country || station.countrycode || '';
    const flag = countryFlag(station.countrycode);
    return (
      '<article class="station-card' + (current ? ' is-current' : '') + '">' +
        '<div class="station-card-top">' +
          stationArtHtml(station) +
          '<div class="station-info">' +
            '<div class="station-name" title="' + escapeHtml(station.name) + '">' + escapeHtml(station.name) + '</div>' +
            '<div class="station-meta">' +
              (country ? '<span>' + flag + ' ' + escapeHtml(country) + '</span>' : '') +
              (station.bitrate ? '<span class="dot"></span><span>' + station.bitrate + ' kbps</span>' : '') +
            '</div>' +
            (tags.length ? '<div class="station-tags">' + tags.map((t) => '<span class="tag-pill">' + escapeHtml(t) + '</span>').join('') + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="station-actions">' +
          '<button type="button" class="btn-play' + (playing ? ' is-playing' : '') + '" data-action="play" data-id="' + escapeHtml(station.stationuuid) + '">' +
            (playing ? icons.pause : icons.play) +
            '<span>' + (playing ? 'Playing' : (current && player.loading ? 'Loading…' : 'Listen')) + '</span>' +
          '</button>' +
          '<button type="button" class="btn-icon' + (fav ? ' is-fav' : '') + '" data-action="fav" data-id="' + escapeHtml(station.stationuuid) + '" title="Favorite">' +
            (fav ? icons.heartFill : icons.heart) +
          '</button>' +
        '</div>' +
      '</article>'
    );
  }

  function emptyMessage() {
    if (state.view === 'favorites') return 'No favorites yet. Heart a station to save it here.';
    if (state.view === 'recent') return 'Stations you play will appear here.';
    if (state.view === 'search') {
      return state.query.trim() ? 'No stations match that search.' : 'Search for a station, city, or keyword.';
    }
    return 'No stations found.';
  }

  function stationsSection(title, meta) {
    if (state.loading && !state.stations.length) {
      return '<div class="loading-box"><div class="spinner"></div><p>Tuning into the world…</p></div>';
    }
    if (state.error && !state.stations.length) {
      return '<div class="error-box">' + escapeHtml(state.error) + '</div>';
    }
    if (!state.stations.length) {
      return '<div class="empty"><p>' + emptyMessage() + '</p></div>';
    }
    const more = state.hasMore && state.view !== 'favorites' && state.view !== 'recent'
      ? '<div class="load-more-wrap"><button type="button" class="btn-more" data-action="more"' +
        (state.loadingMore ? ' disabled' : '') + '>' +
        (state.loadingMore ? 'Loading…' : 'Load more stations') + '</button></div>'
      : '';
    return (
      '<div class="section-head"><h3>' + escapeHtml(title) + '</h3>' +
      (meta ? '<span class="meta">' + escapeHtml(meta) + '</span>' : '') + '</div>' +
      '<div class="station-grid">' + state.stations.map(stationCard).join('') + '</div>' + more
    );
  }

  function filteredCountries() {
    let list = state.countries;
    if (state.continentFilter) {
      const codes = CONTINENTS[state.continentFilter] || [];
      const set = {};
      codes.forEach((c) => { set[c] = true; });
      list = list.filter((c) => set[c.iso_3166_1.toUpperCase()]);
    }
    return list;
  }

  function renderDiscover() {
    return (
      '<section class="hero"><h2>Listen to the world, softly.</h2>' +
      '<p>Thousands of live radio stations from every continent. Pick a mood or drift through the globe.</p></section>' +
      '<div class="section-head"><h3>Moods &amp; genres</h3></div>' +
      '<div class="chip-row">' +
        '<button type="button" class="chip' + (!state.selectedTag ? ' active' : '') + '" data-action="tag" data-tag="">✨ Popular</button>' +
        MOOD_TAGS.map((t) =>
          '<button type="button" class="chip' + (state.selectedTag === t.id ? ' active' : '') + '" data-action="tag" data-tag="' + escapeHtml(t.id) + '">' +
          t.emoji + ' ' + escapeHtml(t.label) + '</button>'
        ).join('') +
      '</div>' +
      stationsSection(
        state.selectedTag
          ? ((MOOD_TAGS.find((t) => t.id === state.selectedTag) || {}).label || state.selectedTag)
          : 'Popular worldwide',
        state.stations.length + (state.hasMore ? '+' : '') + ' stations'
      )
    );
  }

  function renderCountries() {
    if (state.selectedCountry) {
      const c = state.countries.find((x) => x.iso_3166_1 === state.selectedCountry);
      const name = (c && c.name) || state.selectedCountry;
      return (
        '<div class="section-head">' +
          '<h3>' + countryFlag(state.selectedCountry) + ' ' + escapeHtml(name) + '</h3>' +
          '<button type="button" class="chip" data-action="back-countries">← All countries</button>' +
        '</div>' +
        stationsSection('Stations', state.stations.length + (state.hasMore ? '+' : ''))
      );
    }
    if (state.loading) {
      return '<div class="loading-box"><div class="spinner"></div><p>Loading countries…</p></div>';
    }
    const continents = Object.keys(CONTINENTS);
    const list = filteredCountries();
    return (
      '<section class="hero"><h2>Every corner of the map.</h2>' +
      '<p>Browse ' + (state.countries.length || 'hundreds of') + ' countries with live streams.</p></section>' +
      '<div class="continent-tabs">' +
        '<button type="button" class="chip' + (!state.continentFilter ? ' active' : '') + '" data-action="continent" data-continent="">All</button>' +
        continents.map((name) =>
          '<button type="button" class="chip' + (state.continentFilter === name ? ' active' : '') + '" data-action="continent" data-continent="' + escapeHtml(name) + '">' +
          escapeHtml(name) + '</button>'
        ).join('') +
      '</div>' +
      '<div class="section-head"><h3>Countries</h3><span class="meta">' + list.length + ' shown</span></div>' +
      '<div class="browse-grid">' +
        list.map((c) =>
          '<button type="button" class="browse-card" data-action="country" data-code="' + escapeHtml(c.iso_3166_1) + '">' +
            '<div class="flag">' + countryFlag(c.iso_3166_1) + '</div>' +
            '<div class="title">' + escapeHtml(c.name) + '</div>' +
            '<div class="count">' + c.stationcount.toLocaleString() + ' stations</div>' +
          '</button>'
        ).join('') +
      '</div>'
    );
  }

  function renderGenres() {
    if (state.loading) {
      return '<div class="loading-box"><div class="spinner"></div><p>Loading genres…</p></div>';
    }
    return (
      '<section class="hero"><h2>Find your frequency.</h2>' +
      '<p>From ambient and classical to local news and world music.</p></section>' +
      '<div class="section-head"><h3>Popular moods</h3></div>' +
      '<div class="chip-row" style="margin-bottom:28px">' +
        MOOD_TAGS.map((t) =>
          '<button type="button" class="chip" data-action="tag" data-tag="' + escapeHtml(t.id) + '">' +
          t.emoji + ' ' + escapeHtml(t.label) + '</button>'
        ).join('') +
      '</div>' +
      '<div class="section-head"><h3>All genres</h3><span class="meta">' + state.tags.length + ' tags</span></div>' +
      '<div class="browse-grid">' +
        state.tags.map((t) =>
          '<button type="button" class="browse-card" data-action="tag" data-tag="' + escapeHtml(t.name) + '">' +
            '<div class="title">' + escapeHtml(t.name) + '</div>' +
            '<div class="count">' + t.stationcount.toLocaleString() + ' stations</div>' +
          '</button>'
        ).join('') +
      '</div>'
    );
  }

  function renderMain() {
    switch (state.view) {
      case 'discover': return renderDiscover();
      case 'countries': return renderCountries();
      case 'genres': return renderGenres();
      case 'favorites':
        return '<section class="hero"><h2>Your quiet collection.</h2><p>Stations you\'ve saved for later.</p></section>' +
          stationsSection('Favorites', String(state.stations.length));
      case 'recent':
        return '<section class="hero"><h2>Recently tuned.</h2><p>Pick up where you left off.</p></section>' +
          stationsSection('History', String(state.stations.length));
      case 'search':
        return '<div class="section-head"><h3>Search results</h3>' +
          (state.query ? '<span class="meta">for “' + escapeHtml(state.query) + '”</span>' : '') + '</div>' +
          stationsSection('Stations', state.stations.length + (state.hasMore ? '+' : ''));
      default: return '';
    }
  }

  function renderPlayer() {
    const s = state.current;
    if (!s) {
      return '<div class="player-placeholder">Choose a station and let the world drift in…</div>';
    }
    const playing = player.playing;
    const loading = player.loading;
    const err = player.error;
    const country = s.country || s.countrycode || '';
    return (
      '<div class="player-now">' +
        stationArtHtml(s, 'player-art' + (playing ? ' live' : '')) +
        '<div class="player-meta">' +
          '<div class="now-label">' + (loading ? 'Connecting…' : playing ? 'Now playing' : 'Paused') + '</div>' +
          '<div class="now-name">' + escapeHtml(s.name) + '</div>' +
          '<div class="now-sub">' + countryFlag(s.countrycode) + ' ' + escapeHtml(country) +
            (s.bitrate ? ' · ' + s.bitrate + ' kbps' : '') + '</div>' +
          (err ? '<div class="now-error">' + escapeHtml(err) + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="player-controls">' +
        '<div class="eq' + (playing ? ' on' : '') + '" aria-hidden="true"><span></span><span></span><span></span><span></span></div>' +
        '<button type="button" class="btn-main-play" data-action="toggle-play" aria-label="' + (playing ? 'Pause' : 'Play') + '">' +
          (loading && !playing ? icons.loader : playing ? icons.pause : icons.play) +
        '</button>' +
        '<button type="button" class="btn-icon' + (isFav(s.stationuuid) ? ' is-fav' : '') + '" data-action="fav" data-id="' + escapeHtml(s.stationuuid) + '">' +
          (isFav(s.stationuuid) ? icons.heartFill : icons.heart) +
        '</button>' +
      '</div>' +
      '<div class="player-volume">' +
        '<button type="button" class="btn-icon" data-action="mute" title="Mute">' +
          (state.muted || state.volume === 0 ? icons.mute : icons.volume) +
        '</button>' +
        '<input type="range" class="volume-slider" min="0" max="1" step="0.01" value="' +
          (state.muted ? 0 : state.volume) + '" data-action="volume" aria-label="Volume" />' +
      '</div>'
    );
  }

  function findStation(id) {
    return state.stations.find((s) => s.stationuuid === id) ||
      state.recent.find((s) => s.stationuuid === id) ||
      (state.current && state.current.stationuuid === id ? state.current : null);
  }

  async function loadMore() {
    if (state.loadingMore || !state.hasMore) return;
    if (state.view === 'search' && state.query.trim()) await loadSearch(state.query.trim(), false);
    else if (state.view === 'countries' && state.selectedCountry) await loadCountryStations(state.selectedCountry, false);
    else if (state.view === 'discover') await loadDiscover(false);
  }

  function bindEvents() {
    document.querySelectorAll('[data-view]').forEach((btn) => {
      btn.addEventListener('click', () => setView(btn.getAttribute('data-view')));
    });
    document.querySelectorAll('[data-action]').forEach((el) => {
      const action = el.getAttribute('data-action');
      if (action === 'search') {
        el.addEventListener('input', () => {
          state.query = el.value;
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(() => {
            const q = state.query.trim();
            if (q.length >= 2) {
              state.view = 'search';
              state.selectedCountry = null;
              state.selectedTag = null;
              loadSearch(q, true);
            } else if (!q && state.view === 'search') {
              setView('discover');
            }
          }, 350);
        });
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const q = state.query.trim();
            if (q) { state.view = 'search'; loadSearch(q, true); }
          }
        });
        return;
      }
      if (action === 'volume') {
        el.addEventListener('input', () => {
          const v = Number(el.value);
          state.volume = v;
          state.muted = v === 0;
          player.setVolume(v);
          player.setMuted(state.muted);
          saveVolume(v);
        });
        return;
      }
      el.addEventListener('click', () => {
        const id = el.getAttribute('data-id');
        switch (action) {
          case 'play': {
            const station = findStation(id);
            if (!station) return;
            if (state.current && state.current.stationuuid === id && player.playing) player.toggle();
            else playStation(station);
            break;
          }
          case 'toggle-play': player.toggle(); break;
          case 'fav': {
            const station = findStation(id);
            if (station) toggleFavorite(station);
            break;
          }
          case 'mute':
            state.muted = !state.muted;
            player.setMuted(state.muted);
            render();
            break;
          case 'more': loadMore(); break;
          case 'tag': {
            const tag = el.getAttribute('data-tag') || '';
            if (!tag) { state.selectedTag = null; state.view = 'discover'; loadDiscover(true); }
            else openTag(tag);
            break;
          }
          case 'country': openCountry(el.getAttribute('data-code')); break;
          case 'continent':
            state.continentFilter = el.getAttribute('data-continent') || null;
            render();
            break;
          case 'back-countries':
            state.selectedCountry = null; state.stations = []; render();
            break;
          case 'toggle-nav': navOpen = !navOpen; render(); break;
          case 'close-nav': navOpen = false; render(); break;
        }
      });
    });
  }

  function render() {
    const app = document.getElementById('app');
    if (!app) return;
    document.body.classList.toggle('is-playing', player.playing);

    const stationCountLabel = totalStationHint > 0
      ? (Math.floor(totalStationHint / 1000) + 'k+ stations')
      : 'World stations';

    app.innerHTML =
      '<div class="nav-backdrop' + (navOpen ? ' open' : '') + '" data-action="close-nav"></div>' +
      '<aside class="nav' + (navOpen ? ' open' : '') + '">' +
        '<div class="brand"><div class="brand-mark">' + icons.radio + '</div>' +
          '<div class="brand-text"><h1>World Radio</h1><p>Relax &amp; listen</p></div></div>' +
        '<div class="nav-section">Explore</div>' +
        '<button type="button" class="nav-btn' + (state.view === 'discover' ? ' active' : '') + '" data-view="discover">' + icons.discover + ' Discover</button>' +
        '<button type="button" class="nav-btn' + (state.view === 'countries' ? ' active' : '') + '" data-view="countries">' + icons.globe + ' Countries</button>' +
        '<button type="button" class="nav-btn' + (state.view === 'genres' ? ' active' : '') + '" data-view="genres">' + icons.music + ' Genres</button>' +
        '<div class="nav-section">Library</div>' +
        '<button type="button" class="nav-btn' + (state.view === 'favorites' ? ' active' : '') + '" data-view="favorites">' + icons.heart + ' Favorites</button>' +
        '<button type="button" class="nav-btn' + (state.view === 'recent' ? ' active' : '') + '" data-view="recent">' + icons.clock + ' Recent</button>' +
        '<div class="nav-footer">Streams via <a href="https://www.radio-browser.info/" target="_blank" rel="noopener">Radio Browser</a> — free community directory.</div>' +
      '</aside>' +
      '<main class="main">' +
        '<div class="topbar">' +
          '<button type="button" class="mobile-nav-toggle" data-action="toggle-nav" aria-label="Menu">' + icons.menu + '</button>' +
          '<div class="search-wrap">' + icons.search +
            '<input type="search" class="search-input" placeholder="Search stations, cities…" value="' + escapeHtml(state.query) + '" data-action="search" autocomplete="off" spellcheck="false" />' +
          '</div>' +
          '<div class="stats-pill"><strong>' + stationCountLabel + '</strong> online</div>' +
        '</div>' +
        '<div class="content">' + renderMain() + '</div>' +
      '</main>' +
      '<footer class="player">' + renderPlayer() + '</footer>';

    bindEvents();
  }

  player.setVolume(state.volume);
  player.subscribe(() => {
    state.current = player.station || state.current;
    render();
  });

  render();
  ensureMeta();
  loadDiscover(true);
})();
  </script>
  <script>
// PWA Install & SW registration
(function(){
  let deferredPrompt = null;
  const banner = document.getElementById('installBanner');
  const btnInstall = document.getElementById('btnInstall');
  const btnDismiss = document.getElementById('btnDismiss');
  
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    banner.classList.add('show');
    banner.setAttribute('aria-hidden','false');
  });

  btnInstall && btnInstall.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') banner.classList.remove('show');
    deferredPrompt = null;
  });
  btnDismiss && btnDismiss.addEventListener('click', () => {
    banner.classList.remove('show');
    localStorage.setItem('pwa-dismissed', Date.now());
  });

  // Don't nag if dismissed recently
  const dismissed = localStorage.getItem('pwa-dismissed');
  if (dismissed && Date.now() - Number(dismissed) < 1000*60*60*24*3) {
    // hide for 3 days
    banner.style.display = 'none';
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('SW registered', reg.scope);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw && nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              // new version available - could show toast
              console.log('New version available');
            }
          });
        });
      }).catch(err => console.warn('SW failed', err));
    });
  }

  // iOS standalone hint
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !isStandalone && !localStorage.getItem('pwa-dismissed')) {
    setTimeout(()=> banner.classList.add('show'), 2500);
  }
})();
  </script>
